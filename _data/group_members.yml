postdocs:
  - name: "Mauricio Rebouças Rocha"
    role: "Postdoc at USP"
    status: "2024–present"
    photo: "/assets/images/group/mauricio-rocha.jpg"
    bio: "An oceanographer by training, Mauricio holds an M.Sc. in Meteorology 
    from the Universidade do Estado da Paraíba and a Ph.D. in Physical Oceanography from USP.
    He joined our group as a postdoctoral researcher in 2024, supported by Instituto Serrapilheira,
    and is currently funded by a FAPESP postdoctoral fellowship. Using climate simulations spanning
    a range of spatial scales and climate states, Mauricio's project investigates the structure, variability,
    and long-term trends of the Atlantic Meridional Overturning Circulation (AMOC), with a particular
    focus on its abyssal cell. He is also interested in the impacts of AMOC variability on regional and global climate."

