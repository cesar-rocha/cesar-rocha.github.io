  - name: "Rafael Couto Martins"
    role: "Master’s student at USP"
    status: "2024–present"
    photo: "/assets/images/group/rafael-martins.jpg"
    bio: "Rafael is a Master’s student in Physical Oceanography at USP,
    where he also completed his undergraduate degree. Supported by a FAPESP
    scholarship, his research uses process-oriented simulations to investigate
    the role of horizontal shear and frontal curvature in the dynamics of
    submesoscale instabilities in the surface boundary layer. Also with support from 
    FAPESP, he conducted part of his Master’s research at the Laboratoire d’Océanographie Physique et
    Spatiale (LOPS), where he completed a six-month internship with
    Profs. Jonathan Gula and Xavier Carton."

  - name: "Marina Tambelli Romann"
    role: "PhD student at USP"
    status: "2026–present"
    photo: "/assets/images/group/marina-tambelli.jpg"
    bio: "Marina is a Ph.D. student in Physical Oceanography at USP. 
    She joined the group as an undergraduate and, with support from FAPESP, 
    developed her Bachelor’s thesis on abyssal transport in the South Atlantic 
    using the Southern Ocean State Estimate (SOSE). Her doctoral research, 
    also funded by FAPESP, focuses on submesoscale eddy-driven transport of 
    tracers—such as heat and carbon—in the upper ocean, using realistic simulations 
    of the South Atlantic."

  - name: "Paban Bhuyan"
    role: "PhD student at UConn, co-advised with L. Romero"
    status: "2021–present"
    photo: "/assets/images/group/paban-bhuyan.jpg"
    website: "https://pocean23.github.io/"
    bio: "A trained civil engineer, Paban joined our group in 2021 (then based at UConn) after completing a 
          Master's in Climate Science at IIT Budhewassar and working as a 
          Junior Research Fellow at IIT Dheli, both in India. His research investigates the relationship between
          submesoscale frontogenesis and cross-scale  energy fluxes using observations collected during
          the Submesoscale Ocean Dynamics and Vertical Transport Experiment (S-MODE). Paban is supported by the US
          National Science Foundation (NSF)."

  - name: "Pedro Walfir Neto"
    role: "PhD student at USP, co-advised with I. Silveira"
    status: "2023–present"
    photo: "/assets/images/group/pedro-walfir.jpg"
    bio: "Pedro is currently a Ph.D. candidate in Physical Oceanography at USP,
    where he also completed his Bachelor’s degree in Oceanography and his Master’s 
    in Physical Oceanography. Supported by CAPES, his research combines regional numerical
    simulations and process-oriented modeling to investigate flow–topography interactions, 
    with a focus on submesoscale processes in the bottom boundary layer as well as internal tides. 
    His primary region of interest is the Rio Grande Rise, where he examines the dynamical impacts of 
    complex bathymetry on ocean circulation."

  - name: "João Pedro Amorin"
    role: "PhD student at USP, co-advised with I. Silveira"
    status: "2023–present"
    photo: "/assets/images/group/joao-pedro-amorim.jpg"
    bio: "João holds a B.Sc. in Oceanography from Federal University of Pará and an M.Sc.
    in Physical Oceanography from USP. He is currently a Ph.D. candidate at USP,
    where his research focuses on mesoscale and submesoscale dynamics, with particular emphasis on processes
    driving cross-shelf exchanges. Using high-resolution ocean models, João is investigating the mechanisms
    responsible for the formation of low-salinity filaments offshore Cape Santa Marta,
    along the southern Brazilian coast."

undergrads:
  - name: "Lara Medeiros Schlumbom"
    role: "Undergraduate at USP"
    photo: "/assets/images/group/lara-schlumbom.jpg"
    bio: "Lara is an undergraduate student in Oceanography at USP with interests
    in submesoscale dynamics and tracer stirring and mixing. Supported by a FAPESP
    scholarship, her research uses wavenumber spectra from saildrone observations, 
    regional models, and satellite altimetry to investigate submesoscale processes in
    the California Current. Part of this work was carried out at Scripps Institution of
    Oceanography, where—also with support from FAPESP—Lara recently completed a research
    internship with Prof. Sarah Gille."
  - name: "Mariana de Souza Barros"
    role: "Undergraduate at USP"
    photo: "/assets/images/group/mariana-barros.jpg"
    bio: "Mariana is an undergraduate Oceanography student at USP with interests
    in internal wave dynamics and submesoscale processes. Supported by a FAPESP scholarship,
    she is characterizing the spatial and temporal variability of small-scale turbulent mixing
    in the Southwest Atlantic. She is currently conducting part of her project at the National
    Oceanography Centre in Liverpool, where she is undertaking a four-month research internship
    with Dr. André Palóczy, also with support from FAPESP."
  - name: "Pedro Michelin Siqueira"
    role: "Undergraduate researcher at USP"
    photo: "/assets/images/group/pedro-michelin.jpg"
    bio: "Pedro is an undergraduate student in Oceanography at USP. Supported by a FAPESP scholarship, 
    his research uses saildrone observations collected during the Submesoscale Ocean Dynamics Experiment (S-MODE) to 
    investigate the relationship between submesoscale thermohaline compensation and surface-wind variability."
